      tags: [treatments]
      summary: List patient treatments
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: patientId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [all, in_progress, finished, cancelled]
      responses:
        "200":
          description: List of treatments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientTreatment"
    post:
      operationId: createTreatment
      tags: [treatments]
      summary: Create a patient treatment record
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
