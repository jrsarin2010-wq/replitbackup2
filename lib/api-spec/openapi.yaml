openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: DentalAI SaaS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: tenants
    description: Tenant/clinic management
  - name: patients
    description: Patient management
  - name: procedures
    description: Dental procedures management
  - name: appointments
    description: Appointment management
  - name: leads
    description: Lead management
  - name: conversations
    description: WhatsApp conversation management
  - name: messages
    description: WhatsApp messages
  - name: dashboard
    description: Dashboard aggregated data
  - name: reports
    description: Reports and analytics
  - name: settings
    description: Clinic settings
  - name: whatsapp
    description: WhatsApp connection management
  - name: audio
    description: Audio transcription and TTS
  - name: conversations-quota
    description: Monthly AI conversation quota management and recharges
  - name: webhook
    description: Incoming webhooks
  - name: treatments
    description: Patient treatments and financial
  - name: lgpd
    description: LGPD privacy, consent, and audit management

paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestUploadUrlBody'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestUploadUrlResponse'

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ──────────────────────────── TENANTS ────────────────────────────
  /dental/tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List all tenants
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"
    post:
      operationId: createTenant
      tags: [tenants]
      summary: Create a new tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantBody"
      responses:
        "201":
          description: Created tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /dental/tenants/onboarding:
    post:
      operationId: onboardTenant
      tags: [tenants]
      summary: Onboard a new clinic (creates tenant + default settings + seed procedures)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardTenantBody"
      responses:
        "201":
          description: Onboarded tenant with settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardTenantResponse"

  /dental/tenants/{tenantId}:
    parameters:
      - $ref: "#/components/parameters/TenantIdParam"
    get:
      operationId: getTenant
      tags: [tenants]
      summary: Get a tenant by ID
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    patch:
      operationId: updateTenant
      tags: [tenants]
      summary: Update a tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantBody"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    delete:
      operationId: deleteTenant
      tags: [tenants]
      summary: Delete a tenant
      responses:
        "204":
          description: Deleted

  # ──────────────────────────── SUBSCRIPTION ────────────────────────────
  /dental/subscription:
    get:
      operationId: getSubscription
      tags: [subscription]
      summary: Get subscription info including plan, dates, and credit balance
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Subscription info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionInfo"

  /dental/subscription/cancel:
    post:
      operationId: cancelSubscription
      tags: [subscription]
      summary: Cancel the current subscription (valid until expiration date)
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Cancellation confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionInfo"

  /dental/subscription/reactivate:
    post:
      operationId: reactivateSubscription
      tags: [subscription]
      summary: Reactivate a cancelled subscription
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Reactivation confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionInfo"

  # ──────────────────────────── PATIENTS ────────────────────────────
  /dental/patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List patients for a tenant
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: search
          in: query
          schema:
            type: string
        - name: filter
          in: query
          schema:
            type: string
            enum: [all, patients, leads]
            default: patients
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientsListResponse"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create a patient
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientBody"
      responses:
        "201":
          description: Created patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /dental/patients/{patientId}:
    parameters:
      - $ref: "#/components/parameters/TenantHeader"
      - name: patientId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get patient details with appointment history
      responses:
        "200":
          description: Patient with history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientDetail"
    patch:
      operationId: updatePatient
      tags: [patients]
      summary: Update a patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientBody"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
    delete:
      operationId: deletePatient
      tags: [patients]
      summary: Delete a patient
      responses:
        "204":
          description: Deleted

  # ──────────────────────────── PROCEDURES ────────────────────────────
  /dental/procedures:
    get:
      operationId: listProcedures
      tags: [procedures]
      summary: List dental procedures
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: List of procedures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DentalProcedure"
    post:
      operationId: createProcedure
      tags: [procedures]
      summary: Create a procedure
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProcedureBody"
      responses:
        "201":
          description: Created procedure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DentalProcedure"

  /dental/procedures/{procedureId}:
    parameters:
      - $ref: "#/components/parameters/TenantHeader"
      - name: procedureId
        in: path
        required: true
        schema:
          type: integer
    patch:
      operationId: updateProcedure
      tags: [procedures]
      summary: Update a procedure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProcedureBody"
      responses:
        "200":
          description: Updated procedure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DentalProcedure"
    delete:
      operationId: deleteProcedure
      tags: [procedures]
      summary: Delete a procedure
      responses:
        "204":
          description: Deleted

  # ──────────────────────────── APPOINTMENTS ────────────────────────────
  /dental/appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: date
          in: query
          schema:
            type: string
            description: YYYY-MM-DD filter date
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: patientId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppointmentWithPatient"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create an appointment
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentBody"
      responses:
        "201":
          description: Created appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "409":
          description: Conflict - time slot unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictError"

  /dental/appointments/conflicts:
    get:
      operationId: checkAppointmentConflicts
      tags: [appointments]
      summary: Check for conflicts in a proposed time window
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: startsAt
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: endsAt
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: excludeAppointmentId
          in: query
          schema:
            type: integer
            description: Exclude this appointment ID when checking (for reschedules)
      responses:
        "200":
          description: Conflict check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictCheckResponse"

  /dental/appointments/availability:
    get:
      operationId: getAvailability
      tags: [appointments]
      summary: Get available time slots for a date
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: date
          in: query
          required: true
          schema:
            type: string
            description: YYYY-MM-DD
        - name: durationMinutes
          in: query
          schema:
            type: integer
            default: 60
      responses:
        "200":
          description: Available time slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityResponse"

  /dental/appointments/{appointmentId}:
    parameters:
      - $ref: "#/components/parameters/TenantHeader"
      - name: appointmentId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get an appointment
      responses:
        "200":
          description: Appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentWithPatient"
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentBody"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Cancel/delete an appointment
      responses:
        "204":
          description: Deleted

  # ──────────────────────────── LEADS ────────────────────────────
  /dental/leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: temperature
          in: query
          schema:
            type: string
            enum: [cold, warm, hot]
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DentalLead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a lead
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "201":
          description: Created lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DentalLead"

  /dental/leads/{leadId}:
    parameters:
      - $ref: "#/components/parameters/TenantHeader"
      - name: leadId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a lead
      responses:
        "200":
          description: Lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DentalLead"
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadBody"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DentalLead"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      responses:
        "204":
          description: Deleted

  /dental/leads/{leadId}/convert:
    parameters:
      - $ref: "#/components/parameters/TenantHeader"
      - name: leadId
        in: path
        required: true
        schema:
          type: integer
    post:
      operationId: convertLead
      tags: [leads]
      summary: Convert lead to patient
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvertLeadBody"
      responses:
        "200":
          description: Converted patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  # ──────────────────────────── CONVERSATIONS ────────────────────────────
  /dental/conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List WhatsApp conversations
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: contactType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DentalConversation"

  /dental/conversations/{conversationId}:
    parameters:
      - $ref: "#/components/parameters/TenantHeader"
      - name: conversationId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get a conversation with messages
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"

  /dental/conversations/{conversationId}/messages:
    parameters:
      - $ref: "#/components/parameters/TenantHeader"
      - name: conversationId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: listMessages
      tags: [messages]
      summary: Get messages for a conversation
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DentalMessage"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in a conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DentalMessage"

  # ──────────────────────────── DASHBOARD ────────────────────────────
  /dental/dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard KPI summary
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

  /dental/dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Get recent activity feed
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DentalActivity"

  # ──────────────────────────── REPORTS ────────────────────────────
  /dental/reports/appointments:
    get:
      operationId: getAppointmentsReport
      tags: [reports]
      summary: Appointments by period report
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: startDate
          in: query
          required: true
          schema:
            type: string
        - name: endDate
          in: query
          required: true
          schema:
            type: string
        - name: groupBy
          in: query
          schema:
            type: string
            enum: [day, week, month]
            default: day
      responses:
        "200":
          description: Appointments report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentsReport"

  /dental/reports/revenue:
    get:
      operationId: getRevenueReport
      tags: [reports]
      summary: Revenue report by period
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: startDate
          in: query
          required: true
          schema:
            type: string
        - name: endDate
          in: query
          required: true
          schema:
            type: string
        - name: groupBy
          in: query
          schema:
            type: string
            enum: [day, week, month]
            default: day
      responses:
        "200":
          description: Revenue report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueReport"

  /dental/reports/procedures:
    get:
      operationId: getProceduresReport
      tags: [reports]
      summary: Top procedures report
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Procedures report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProcedureReportItem"

  /dental/reports/peak-hours:
    get:
      operationId: getPeakHoursReport
      tags: [reports]
      summary: Peak hours report
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Peak hours data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PeakHourItem"

  /dental/reports/leads:
    get:
      operationId: getLeadsReport
      tags: [reports]
      summary: Lead conversion report
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Leads conversion report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsReport"

  # ──────────────────────────── SETTINGS ────────────────────────────
  /dental/settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get clinic settings
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DentalSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update clinic settings
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DentalSettings"

  # ──────────────────────────── PROFESSIONALS ────────────────────────────
  /dental/professionals:
    get:
      operationId: listProfessionals
      tags: [professionals]
      summary: List dental professionals for the tenant
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: includeInactive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Professionals list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalsListResponse"
    post:
      operationId: createProfessional
      tags: [professionals]
      summary: Create a new professional
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfessionalBody"
      responses:
        "201":
          description: Created professional
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DentalProfessional"

  /dental/professionals/{professionalId}:
    get:
      operationId: getProfessional
      tags: [professionals]
      summary: Get a professional by ID
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: professionalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Professional
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DentalProfessional"
    patch:
      operationId: updateProfessional
      tags: [professionals]
      summary: Update a professional
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: professionalId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfessionalBody"
      responses:
        "200":
          description: Updated professional
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DentalProfessional"
    delete:
      operationId: deleteProfessional
      tags: [professionals]
      summary: Delete (deactivate) a professional
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: professionalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
