      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: treatmentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTreatmentBody"
      responses:
        "200":
          description: Treatment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientTreatment"
    delete:
      operationId: deleteTreatment
      tags: [treatments]
      summary: Delete a treatment
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: treatmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Treatment deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # ──────────────────────────── EXPENSES ────────────────────────────
  /dental/expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expenses with optional filters
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: category
          in: query
          schema:
            type: string
            enum: [aluguel, material, salario, fornecedor, manutencao, outros]
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create an expense
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseBody"
      responses:
        "201":
          description: Expense created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /dental/expenses/{expenseId}:
    get:
      operationId: getExpense
      tags: [expenses]
      summary: Get a single expense
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: expenseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expense data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
    put:
      operationId: updateExpense
      tags: [expenses]
      summary: Update an expense
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: expenseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExpenseBody"
      responses:
        "200":
          description: Expense updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: expenseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expense deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # ──────────────────────────── LGPD ────────────────────────────
  /dental/lgpd/consent:
    get:
      operationId: listConsents
      tags: [lgpd]
      summary: List consent records for the tenant
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: entityType
          in: query
          schema:
            type: string
            enum: [patient, lead]
        - name: entityId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of consent records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConsentRecord"
    post:
      operationId: createConsent
      tags: [lgpd]
      summary: Record a new consent
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConsentBody"
      responses:
        "201":
          description: Consent recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentRecord"

  /dental/lgpd/audit-log:
    get:
      operationId: listAuditLog
      tags: [lgpd]
      summary: List audit log entries for the tenant
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: action
          in: query
          schema:
            type: string
            enum: [create, read, update, delete, anonymize]
        - name: entityType
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"

  /dental/lgpd/anonymize/{entityType}/{entityId}:
    post:
      operationId: anonymizeEntity
      tags: [lgpd]
      summary: Anonymize patient or lead data (right to be forgotten)
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: entityType
          in: path
          required: true
          schema:
            type: string
            enum: [patient, lead]
        - name: entityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Data anonymized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /dental/recovery/stats:
    get:
      operationId: getRecoveryStats
      tags: [recovery]
      summary: Get recovery campaign statistics
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: ["7d", "30d", "90d"]
      responses:
        "200":
          description: Recovery stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryStats"

  /dental/recovery/candidates:
    get:
      operationId: getRecoveryCandidates
      tags: [recovery]
      summary: List patients and leads eligible for recovery
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Recovery candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecoveryCandidate"

  /dental/recovery/manual-send/{entityType}/{entityId}:
    post:
      operationId: manualRecoverySend
      tags: [recovery]
      summary: Manually trigger a recovery message for a patient or lead
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: entityType
          in: path
          required: true
          schema:
            type: string
            enum: [patient, lead]
        - name: entityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recovery message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success

components:
  parameters:
    TenantIdParam:
      name: tenantId
      in: path
      required: true
      schema:
        type: integer

    TenantHeader:
      name: x-tenant-id
      in: header
      required: true
      schema:
        type: integer
      description: Tenant (clinic) ID

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── LGPD ───
    ConsentRecord:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        entityType:
          type: string
        entityId:
          type: integer
        consentType:
          type: string
        termsVersion:
          type: string
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        grantedAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - tenantId
        - entityType
        - entityId
        - consentType
        - termsVersion
        - grantedAt

    CreateConsentBody:
      type: object
      properties:
        entityType:
          type: string
          enum: [patient, lead]
        entityId:
          type: integer
        consentType:
          type: string
        termsVersion:
          type: string
          default: "1.0"
      required:
        - entityType
        - entityId
        - consentType

    AuditLogEntry:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        action:
          type: string
        entityType:
          type: string
        entityId:
          type: integer
          nullable: true
        field:
          type: string
          nullable: true
        userId:
          type: integer
          nullable: true
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        metadata:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - tenantId
        - action
        - entityType
        - createdAt

    # ─── TENANT ───
    OnboardTenantBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        plan:
          type: string
          default: free
        clinicName:
          type: string
          nullable: true
        clinicPhone:
          type: string
          nullable: true
        workingHoursStart:
          type: string
          default: "08:00"
        workingHoursEnd:
          type: string
          default: "18:00"
      required:
        - name
        - slug

    OnboardTenantResponse:
      type: object
      properties:
        tenant:
          $ref: "#/components/schemas/Tenant"
        settings:
          $ref: "#/components/schemas/DentalSettings"
        procedures:
          type: array
          items:
            $ref: "#/components/schemas/DentalProcedure"
      required:
        - tenant
        - settings
        - procedures

    Tenant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        plan:
          type: string
        subscriptionStatus:
          type: string
        subscribedAt:
          type: string
          format: date-time
          nullable: true
        subscriptionExpiresAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        whatsappProvider:
          type: string
        evolutionApiUrl:
          type: string
          nullable: true
        evolutionApiKey:
          type: string
          nullable: true
        evolutionInstanceName:
          type: string
          nullable: true
        uazapiHost:
          type: string
          nullable: true
        uazapiAdminToken:
          type: string
          nullable: true
        uazapiInstanceToken:
          type: string
          nullable: true
        uazapiInstanceId:
          type: string
          nullable: true
        elevenLabsApiKey:
          type: string
          nullable: true
        whatsappConnected:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - plan
        - subscriptionStatus
        - whatsappConnected
        - createdAt
        - updatedAt

    SubscriptionInfo:
      type: object
      properties:
        plan:
          type: string
        subscriptionStatus:
          type: string
        subscribedAt:
          type: string
          format: date-time
          nullable: true
        subscriptionExpiresAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        creditBalance:
          type: integer
        clinicName:
          type: string
      required:
        - plan
        - subscriptionStatus
        - creditBalance
        - clinicName

    CreateTenantBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        plan:
          type: string
          default: free
      required:
        - name
        - slug

    UpdateTenantBody:
      type: object
      properties:
        name:
          type: string
        plan:
          type: string
        whatsappProvider:
          type: string
        evolutionApiUrl:
          type: string
          nullable: true
        evolutionApiKey:
          type: string
          nullable: true
        evolutionInstanceName:
          type: string
          nullable: true
        uazapiHost:
          type: string
          nullable: true
        uazapiAdminToken:
          type: string
          nullable: true
        uazapiInstanceToken:
          type: string
          nullable: true
        uazapiInstanceId:
          type: string
          nullable: true
        elevenLabsApiKey:
          type: string
          nullable: true
        openaiApiKey:
          type: string
          nullable: true

    # ─── PATIENT ───
    Patient:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        birthDate:
          type: string
          nullable: true
        cpf:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        profilePicUrl:
          type: string
          nullable: true
        firstVisit:
          type: string
          format: date-time
          nullable: true
        lastVisit:
          type: string
          format: date-time
          nullable: true
        totalSpent:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - tenantId
        - name
        - phone
        - totalSpent
        - createdAt
        - updatedAt

    PatientDetail:
      allOf:
        - $ref: "#/components/schemas/Patient"
        - type: object
          properties:
            appointments:
              type: array
              items:
                $ref: "#/components/schemas/Appointment"
