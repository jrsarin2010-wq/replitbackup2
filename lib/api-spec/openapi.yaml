          application/json:
            schema:
              type: object
              properties:
                voiceId:
                  type: string
                provider:
                  type: string
                  enum: [cartesia, elevenlabs]
                phrase:
                  type: string
                  enum: [short, long]
                  description: Choose the preview phrase. "short" is a greeting; "long" is a realistic schedule-offer sentence to evaluate breath/prosody.
              required:
                - voiceId
      responses:
        "200":
          description: Audio preview as base64
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoicePreviewResponse"

  /dental/audio/credits:
    get:
