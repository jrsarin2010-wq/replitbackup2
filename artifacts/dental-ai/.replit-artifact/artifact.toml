kind = "web"
previewPath = "/"
title = "DentalAI Secretary"
version = "1.0.0"
id = "artifacts/dental-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/dental-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dental-ai", "run", "build" ]
publicDir = "artifacts/dental-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
